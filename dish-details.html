<!DOCTYPE html>
<html class="light" lang="en">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>MATAMKOM | Dish Details</title>

    <!-- Fonts -->
    <link
        href="https://fonts.googleapis.com/css2?family=Epilogue:wght@400;600;700;800&amp;family=Work+Sans:wght@400;500;600&amp;display=swap"
        rel="stylesheet" />

    <!-- Material Symbols -->
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet" />

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>

    <!-- Shared Configuration & Styles -->
    <script src="./js/tailwind-config.js"></script>
    <link rel="stylesheet" href="./css/styles.css">

    <!-- Translation & Theme System -->
    <script src="./js/translations.js"></script>
    <script src="./js/language-selector.js"></script>
    <script src="./js/theme-manager.js"></script>
</head>

<body
    class="bg-surface-bright dark:bg-slate-950 text-on-surface dark:text-slate-200 font-body-md antialiased transition-colors">
    <!-- TopAppBar -->
    <header
        class="glass-surface border-b border-slate-200 dark:border-white/10 docked full-width top-0 sticky z-50 transition-colors">
        <div class="flex justify-between items-center w-full px-6 py-4 mx-auto max-w-container-max">
            <div class="flex items-center gap-4">
                <span class="text-lg font-bold tracking-widest text-primary dark:text-abyss-primary font-h1"
                    data-i18n="brand_name">MATAMKOM</span>
            </div>
            <nav class="hidden md:flex gap-md">
                <a class="text-slate-500 dark:text-abyss-on-variant font-label-caps hover:text-secondary dark:hover:text-abyss-secondary transition-colors duration-200"
                    href="index.html" data-i18n="nav_home">Home</a>
                <a class="text-primary dark:text-abyss-primary font-bold font-label-caps hover:text-secondary dark:hover:text-abyss-secondary transition-colors duration-200"
                    href="menu.html" data-i18n="nav_menu">Menu</a>
                <a class="text-slate-500 dark:text-abyss-on-variant font-label-caps hover:text-secondary dark:hover:text-abyss-secondary transition-colors duration-200"
                    href="order.html" data-i18n="nav_orders">Orders</a>
                <a class="text-slate-500 dark:text-abyss-on-variant font-label-caps hover:text-secondary dark:hover:text-abyss-secondary transition-colors duration-200"
                    href="contact.html" data-i18n="nav_contact">Contact</a>
            </nav>
            <div class="flex items-center gap-3">
                <button onclick="toggleLanguage()"
                    class="p-2 hover:bg-slate-100 dark:hover:bg-white/5 rounded-full transition-colors flex items-center justify-center text-slate-500 dark:text-abyss-on-variant"
                    title="Change Language">
                    <span class="material-symbols-outlined">translate</span>
                </button>
                <button
                    id="theme-toggle"
                    class="p-2 hover:bg-slate-100 dark:hover:bg-white/5 rounded-full transition-colors flex items-center justify-center text-slate-500 dark:text-abyss-on-variant"
                    data-i18n-title="theme_toggle_dark">
                    <span class="material-symbols-outlined">dark_mode</span>
                </button>
            </div>
        </div>
    </header>

    <main class="max-w-[1200px] mx-auto px-6 py-xl">
        <!-- Back Button Mobile Only -->
        <div class="md:hidden mb-base">
            <a href="menu.html" class="flex items-center gap-2 text-[#003366] dark:text-blue-300">
                <span class="material-symbols-outlined">arrow_back</span>
                <span class="font-label-caps text-label-caps" data-i18n="back_to_menu">BACK TO MENU</span>
            </a>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-lg items-start" id="dish-details-content">
            <!-- Dynamic Content Injected Here -->
        </div>
    </main>

    <script src="./js/data.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const data = getMenuData();
            const currentLang = localStorage.getItem('preferred_language') || 'en';

            // Pick an item (or use URL param logic)
            const item = data[0];

            const content = document.getElementById('dish-details-content');
            const name = currentLang === 'ar' ? item.name_ar : item.name;
            const desc = currentLang === 'ar' ? item.description_ar : item.description;

            content.innerHTML = `
                <!-- Image Gallery -->
                <div class="lg:col-span-7 space-y-sm">
                    <div class="overflow-hidden bg-surface-container-low dark:bg-abyss-container border border-outline-variant dark:border-white/10 rounded-xl">
                        <img class="w-full aspect-[4/3] object-cover" src="${item.image}">
                    </div>
                </div>

                <!-- Content Area -->
                <div class="lg:col-span-5 space-y-lg text-start px-4 md:px-0">
                    <div class="space-y-sm">
                        <span class="font-label-caps text-label-caps text-secondary dark:text-abyss-secondary px-3 py-1 bg-secondary-fixed-dim dark:bg-abyss-secondary/10 rounded-sm inline-block" data-i18n="item_label_signature">CHEF'S SIGNATURE</span>
                        <h1 class="font-h1 text-headline-lg text-primary dark:text-white leading-tight">${name}</h1>
                        <p class="font-body-lg text-body-lg text-on-surface-variant dark:text-abyss-on-variant">${desc}</p>
                    </div>

                    <div class="border-y border-outline-variant dark:border-white/10 py-md flex justify-between items-center">
                        <span class="font-h2 text-headline-md text-secondary dark:text-abyss-secondary">$${item.price.toFixed(2)}</span>
                    </div>

                    <div class="space-y-base">
                        <a href="order.html" class="w-full bg-primary dark:bg-abyss-secondary text-white dark:text-abyss-on-secondary py-5 font-label-caps text-label-caps tracking-widest bioluminescent-glow transition-all inline-block text-center rounded-xl" data-i18n="btn_add_order">
                            ADD TO ORDER
                        </a>
                    </div>
                </div>
            `;

            // Ensure UI translates
            applyLanguage(currentLang);
        });
    </script>

    <!-- Footer -->
    <footer
        class="bg-slate-50 dark:bg-slate-950 border-t border-slate-200 dark:border-slate-800 py-12 full-width transition-colors">
        <div class="flex flex-col items-center gap-6 px-6 max-w-7xl mx-auto">
            <span class="font-bold text-[#003366] dark:text-blue-100 tracking-widest font-h1 text-2xl"
                data-i18n="brand_name">MATAMKOM</span>
            <div
                class="flex flex-wrap justify-center gap-8 text-xs font-['Epilogue'] tracking-normal text-slate-500 dark:text-slate-400">
                <a class="hover:text-orange-500 transition-colors" href="#"
                    data-i18n="footer_sustainability">Sustainability</a>
                <a class="hover:text-orange-500 transition-colors" href="#" data-i18n="footer_careers">Careers</a>
                <a class="hover:text-orange-500 transition-colors" href="#" data-i18n="footer_privacy">Privacy</a>
                <a class="hover:text-orange-500 transition-colors" href="#" data-i18n="footer_terms">Terms</a>
            </div>
            <p class="text-xs font-['Epilogue'] tracking-normal text-slate-400" data-i18n="footer_copy">© 2024 COASTAL
                CATCH. PRECISELY SOURCED.</p>
        </div>
    </footer>

    <!-- BottomNavBar -->
    <nav
        class="md:hidden fixed bottom-0 left-0 w-full flex justify-around items-center bg-white dark:bg-slate-900 border-t border-slate-200 dark:border-slate-800 px-2 pb-safe z-50 h-16 shadow-[0_-4px_12px_rgba(0,0,0,0.1)] transition-colors">
        <a class="flex flex-col items-center justify-center text-slate-400 dark:text-slate-500 pt-2 flex-1 h-full"
            href="index.html">
            <span class="material-symbols-outlined">home</span>
            <span class="text-[10px] uppercase font-bold tracking-wider font-['Epilogue'] mt-1"
                data-i18n="nav_home">Home</span>
        </a>
        <a class="flex flex-col items-center justify-center text-[#003366] dark:text-blue-300 border-t-2 border-[#003366] dark:border-blue-300 pt-2 flex-1 h-full"
            href="menu.html">
            <span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">restaurant_menu</span>
            <span class="text-[10px] uppercase font-bold tracking-wider font-['Epilogue'] mt-1"
                data-i18n="nav_menu">Menu</span>
        </a>
        <a class="flex flex-col items-center justify-center text-slate-400 dark:text-slate-500 pt-2 flex-1 h-full"
            href="order.html">
            <span class="material-symbols-outlined">shopping_cart</span>
            <span class="text-[10px] uppercase font-bold tracking-wider font-['Epilogue'] mt-1"
                data-i18n="nav_orders">Orders</span>
        </a>
        <a class="flex flex-col items-center justify-center text-slate-400 dark:text-slate-500 pt-2 flex-1 h-full"
            href="#">
            <span class="material-symbols-outlined">location_on</span>
            <span class="text-[10px] uppercase font-bold tracking-wider font-['Epilogue'] mt-1"
                data-i18n="nav_contact">Contact</span>
        </a>
    </nav>
</body>

</html>
